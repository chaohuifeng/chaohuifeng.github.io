<div class="rainbow-strip"></div>
<header class="site-header">
  <div class="header-container">
    <div class="site-title">
      <a href="/" class="site-name">Chaohui Feng</a>
    </div>
    
    <nav class="site-nav" id="site-nav">
      <ul class="nav-list">
        <li class="nav-item">
          <a href="/" class="nav-link">Home</a>
        </li>
        <li class="nav-item">
          <a href="/about" class="nav-link">About</a>
        </li>
        <li class="nav-item">
          <a href="/projects" class="nav-link">Projects</a>
        </li>
        <li class="nav-item">
          <a href="/publications" class="nav-link">Publications</a>
        </li>
      </ul>
    </nav>
    
    <button class="mobile-menu-toggle" type="button" aria-label="Toggle navigation" aria-controls="site-nav" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</header>

<style>
.site-header {
  background: white;
  box-shadow: 0 2px 10px rgba(79,38,131,0.12);
  position: sticky;
  top: 0;
  z-index: 1000;
  border-bottom: 2px solid #ded7e8;
}

.rainbow-strip {
  height: 6px;
  background: linear-gradient(90deg, #e23d28 0%, #f4b000 18%, #72a950 36%, #00a3a3 54%, #2f6fd6 72%, #4f2683 100%);
}

.header-container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 1rem 2rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.site-title {
  display: flex;
  flex-direction: column;
}

.site-name {
  font-size: 1.8rem;
  font-weight: 700;
  color: #4f2683;
  text-decoration: none;
  margin-bottom: 0.2rem;
}

.site-nav {
  display: flex;
}

.nav-list {
  display: flex;
  list-style: none;
  margin: 0;
  padding: 0;
  gap: 2rem;
}

.nav-list .nav-item {
  padding-left: 0;
  margin-bottom: 0;
}

.nav-list .nav-item:before {
  content: none;
}

.nav-link {
  color: #2c2438;
  text-decoration: none;
  font-weight: 500;
  padding: 0.5rem 1rem;
  border-radius: 20px;
  transition: all 0.3s ease;
  position: relative;
}

.nav-link:hover {
  color: #4f2683;
  background: #f6f2fb;
}

.nav-link:after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 50%;
  width: 0;
  height: 2px;
  background: #4f2683;
  transition: all 0.3s ease;
  transform: translateX(-50%);
}

.nav-link:hover:after {
  width: 80%;
}

.mobile-menu-toggle {
  display: none;
  flex-direction: column;
  cursor: pointer;
  gap: 4px;
  border: 0;
  background: transparent;
  padding: 0.5rem;
}

.mobile-menu-toggle span {
  width: 25px;
  height: 3px;
  background: #4f2683;
  transition: all 0.3s ease;
}

@media (max-width: 768px) {
  .site-nav {
    display: none;
    position: absolute;
    top: calc(100% + 2px);
    left: 0;
    right: 0;
    background: white;
    border-bottom: 1px solid #ded7e8;
    box-shadow: 0 10px 24px rgba(79,38,131,0.12);
    padding: 0.75rem 1rem 1rem;
  }

  .site-nav.is-open {
    display: block;
  }

  .nav-list {
    flex-direction: column;
    gap: 0.4rem;
  }

  .nav-link {
    display: block;
    padding: 0.75rem 0.9rem;
  }
  
  .mobile-menu-toggle {
    display: flex;
  }
  
  .header-container {
    padding: 1rem;
  }
  
  .site-name {
    font-size: 1.5rem;
  }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function () {
  var toggle = document.querySelector('.mobile-menu-toggle');
  var nav = document.getElementById('site-nav');
  if (!toggle || !nav) return;

  toggle.addEventListener('click', function () {
    var isOpen = nav.classList.toggle('is-open');
    toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
  });

  nav.addEventListener('click', function (event) {
    if (event.target && event.target.matches('a')) {
      nav.classList.remove('is-open');
      toggle.setAttribute('aria-expanded', 'false');
    }
  });
});
</script>
